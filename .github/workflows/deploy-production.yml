name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test SSH Connection
        run: |
          echo "🔧 Creating SSH key file..."
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          echo "🔍 Creating test script to verify execution location and environment variables..."
          cat > /tmp/test_location.sh << 'EOF'
          #!/bin/bash
          echo "🔍 TEST SCRIPT EXECUTION LOCATION:"
          echo "=================================="
          echo "Current working directory: $(pwd)"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "Date: $(date)"
          echo "Environment: $ENVIRONMENT"
          echo "Available files in current directory:"
          ls -la
          echo "=================================="
          echo "🔍 TESTING ENVIRONMENT VARIABLES:"
          echo "=================================="
          echo "MONGODB_URI_PROD: $MONGODB_URI_PROD"
          echo "MONGODB_URI_DEV: $MONGODB_URI_DEV"
          echo "SESSION_SECRET: $SESSION_SECRET"
          echo "JWT_SECRET: $JWT_SECRET"
          echo "GOOGLE_CLIENT_ID: $GOOGLE_CLIENT_ID"
          echo "GOOGLE_CLIENT_SECRET: $GOOGLE_CLIENT_SECRET"
          echo "S3_BUCKET: $S3_BUCKET"
          echo "AWS_REGION: $AWS_REGION"
          echo "AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID"
          echo "AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY"
          echo "=================================="
          EOF
          
          chmod +x /tmp/test_location.sh
          
          echo "🔍 Uploading test script to server..."
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key /tmp/test_location.sh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/
          
          echo "🔍 Executing test script on server with environment variables..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "export MONGODB_URI_PROD='${{ secrets.MONGODB_URI_PROD }}'; export MONGODB_URI_DEV='${{ secrets.MONGODB_URI_DEV }}'; export SESSION_SECRET='${{ secrets.SESSION_SECRET }}'; export JWT_SECRET='${{ secrets.JWT_SECRET }}'; export GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}'; export GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}'; export S3_BUCKET='${{ secrets.S3_BUCKET }}'; export AWS_REGION='${{ secrets.AWS_REGION }}'; export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'; export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'; /tmp/test_location.sh"
          
          echo "🔍 Test completed - check output above to verify script ran on server"

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build applications
        run: pnpm build

      - name: Create deployment package
        run: |
          mkdir -p deployment-package
          
          # Copy web app source code for building
          cp -r apps/web deployment-package/web-src
          # Also copy built files as fallback
          cp -r apps/web/.next deployment-package/web-next
          cp -r apps/web/public deployment-package/web-public
          # Note: package.json will be copied after modification
          
          # Copy API build
          cp -r apps/api/dist deployment-package/api-dist
          cp -r apps/api/migrations deployment-package/api-migrations
          cp apps/api/config/migrate-mongo-config.js deployment-package/migrate-mongo-config.cjs
          # Note: package.json will be copied after modification
          
          # Generate npm lockfiles for deployment
          echo "📦 Generating npm lockfiles for deployment..."
          
          # First, resolve workspace dependencies by reading the actual version from packages/types
          echo "🔧 Resolving workspace dependencies..."
          TYPES_VERSION=$(node -e "const pkg = JSON.parse(require('fs').readFileSync('packages/types/package.json', 'utf8')); console.log(pkg.version);")
          echo "📝 Types package version: $TYPES_VERSION"
          
          # Create npm-compatible package.json files with resolved versions
          echo "🔧 Creating npm-compatible package.json files..."
          
          # For web app
          cd apps/web
          cp package.json package.json.backup
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.dependencies['@whitepine/types'] = '$TYPES_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --omit=dev --package-lock-only
          cp package-lock.json ../../deployment-package/web-package-lock.json
          cp package.json ../../deployment-package/web-package.json  # Copy modified package.json
          rm package-lock.json
          mv package.json.backup package.json
          
          # For API
          cd ../api
          cp package.json package.json.backup
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.dependencies['@whitepine/types'] = '$TYPES_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --omit=dev --package-lock-only
          cp package-lock.json ../../deployment-package/api-package-lock.json
          cp package.json ../../deployment-package/api-package.json  # Copy modified package.json
          rm package-lock.json
          mv package.json.backup package.json
          
          cd ../..
          
          # Copy ops configuration
          cp -r apps/ops deployment-package/ops
          
          # Copy packages directory for monorepo workspace dependencies (excluding node_modules)
          echo "🔍 Debug: Checking packages directory structure..."
          ls -la packages/ || echo "packages directory not found"
          ls -la packages/types/ || echo "packages/types directory not found"
          
          mkdir -p deployment-package/packages/types
          
          # Copy files only if they exist
          if [ -d "packages/types/src" ]; then
            echo "🔍 Debug: Copying packages/types/src..."
            cp -r packages/types/src deployment-package/packages/types/src
          else
            echo "⚠️ packages/types/src not found, skipping..."
          fi
          
          if [ -d "packages/types/dist" ]; then
            echo "🔍 Debug: Copying packages/types/dist..."
            cp -r packages/types/dist deployment-package/packages/types/dist
          else
            echo "⚠️ packages/types/dist not found, skipping..."
          fi
          
          if [ -f "packages/types/package.json" ]; then
            echo "🔍 Debug: Copying packages/types/package.json..."
            cp packages/types/package.json deployment-package/packages/types/package.json
          else
            echo "⚠️ packages/types/package.json not found, skipping..."
          fi
          
          if [ -f "packages/types/tsconfig.json" ]; then
            echo "🔍 Debug: Copying packages/types/tsconfig.json..."
            cp packages/types/tsconfig.json deployment-package/packages/types/tsconfig.json
          else
            echo "⚠️ packages/types/tsconfig.json not found, skipping..."
          fi
          
          # Build web app in GitHub Actions with correct dependencies
          echo "🔧 Building web app in GitHub Actions..."
          cd deployment-package/web-src
          
          # Install dependencies
          echo "📦 Installing web app dependencies..."
          pnpm install --prod
          
          # Create symlink for @whitepine/types
          echo "🔧 Creating @whitepine/types symlink..."
          mkdir -p node_modules/@whitepine
          cd node_modules/@whitepine
          ln -sf ../../../packages/types types
          cd ../..
          
          # Build the web app with relative paths
          echo "🔧 Building Next.js app with relative paths..."
          # Set NODE_ENV to production to ensure proper build
          export NODE_ENV=production
          # Set NEXT_TELEMETRY_DISABLED to avoid telemetry paths
          export NEXT_TELEMETRY_DISABLED=1
          # Set NEXT_BUILD_ID to a fixed value to avoid path issues
          export NEXT_BUILD_ID=whitepine-build
          # Set PWD to a relative path to avoid absolute paths in build
          export PWD=/var/www/whitepine/current/web
          # Install missing dependencies that might be needed for build
          echo "🔧 Installing missing build dependencies..."
          pnpm add aws4 --save-dev || echo "Could not install aws4, continuing with build"
          # Build with output tracing disabled to avoid absolute paths
          pnpm run build
          
          # Copy the built files to the main web-next directory
          echo "🔧 Copying built files..."
          cp -r .next ../web-next
          
          # Fix any absolute paths in the built files
          echo "🔧 Fixing absolute paths in built files..."
          # Replace any absolute paths with relative paths
          find ../web-next -name "*.js" -type f -exec sed -i 's|/var/www/whitepine/releases/[^/]*/web|/var/www/whitepine/current/web|g' {} \;
          find ../web-next -name "*.json" -type f -exec sed -i 's|/var/www/whitepine/releases/[^/]*/web|/var/www/whitepine/current/web|g' {} \;
          # Also fix any other absolute paths that might be in the build
          find ../web-next -name "*.js" -type f -exec sed -i 's|/home/runner/[^/]*/deployment-package/web-src|/var/www/whitepine/current/web|g' {} \;
          # Fix any paths that might reference the GitHub Actions workspace
          find ../web-next -name "*.js" -type f -exec sed -i 's|/github/workspace/[^/]*/deployment-package/web-src|/var/www/whitepine/current/web|g' {} \;
          # Fix any paths that might reference the current working directory
          find ../web-next -name "*.js" -type f -exec sed -i 's|/home/runner/[^/]*/deployment-package/web-src|/var/www/whitepine/current/web|g' {} \;
          
          cd ../..
          
          # Create deployment script
          cat > deployment-package/deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          ENVIRONMENT=prod
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_DIR="/var/www/whitepine/releases/$TIMESTAMP"
          CURRENT_DIR="/var/www/whitepine/current"
          SHARED_DIR="/var/www/whitepine/shared"
          
          echo "🚀 Starting deployment for environment: $ENVIRONMENT"
          echo "📦 Release directory: $RELEASE_DIR"
          echo "🔍 Debug: Deployment script version: $(date)"
          echo "🔍 Debug: This deployment includes API dependency reinstallation fix"
          echo "🔍 Debug: RELEASE_DIR is set to: $RELEASE_DIR"
          echo "🔍 Debug: Current working directory: $(pwd)"
          echo "🔍 Debug: Available files in current directory:"
          ls -la
          
          # Create release directory
          mkdir -p "$RELEASE_DIR"
          
          # Copy web app built files (built in GitHub Actions)
          mkdir -p "$RELEASE_DIR/web"
          echo "🔧 Copying web app built files..."
          cp -r /tmp/deployment/web-next "$RELEASE_DIR/web/.next"
          cp -r /tmp/deployment/web-public "$RELEASE_DIR/web/public"
          cp /tmp/deployment/web-package.json "$RELEASE_DIR/web/package.json"
          cp /tmp/deployment/web-package-lock.json "$RELEASE_DIR/web/package-lock.json"
          
          # Copy API
          echo "🔧 Copying API files..."
          echo "🔍 Debug: API source directories:"
          echo "🔍 Debug: Checking API dist and migrations directories..."
          echo "🔍 Debug: Creating API directory: $RELEASE_DIR/api"
          mkdir -p "$RELEASE_DIR/api"
          echo "🔍 Debug: Copying API dist files..."
          cp -r /tmp/deployment/api-dist "$RELEASE_DIR/api/dist"
          echo "🔍 Debug: Copying API migrations..."
          cp -r /tmp/deployment/api-migrations "$RELEASE_DIR/api/migrations"
          echo "🔍 Debug: Copying API package files..."
          cp /tmp/deployment/api-package.json "$RELEASE_DIR/api/package.json"
          cp /tmp/deployment/api-package-lock.json "$RELEASE_DIR/api/package-lock.json"
          cp /tmp/deployment/migrate-mongo-config.cjs "$RELEASE_DIR/api/migrate-mongo-config.cjs"
          echo "🔍 Debug: API directory after copying:"
          ls -la "$RELEASE_DIR/api" || echo "API directory not found"
          echo "🔍 Debug: API dist directory after copying:"
          ls -la "$RELEASE_DIR/api/dist" || echo "API dist directory not found"
          
          # Copy ops
          echo "🔍 Debug: Copying ops directory..."
          echo "🔍 Debug: Ops source directory contents:"
          echo "🔍 Debug: Ops config directory contents:"
          cp -r /tmp/deployment/ops "$RELEASE_DIR/ops"
          
          # Copy packages directory for monorepo workspace dependencies
          echo "🔍 Debug: Copying packages directory..."
          mkdir -p "$RELEASE_DIR/packages/types"
          
          # Copy files only if they exist
          if [ -d "/tmp/deployment/packages/types/src" ]; then
            echo "🔍 Debug: Copying packages/types/src..."
            cp -r /tmp/deployment/packages/types/src "$RELEASE_DIR/packages/types/src"
          else
            echo "⚠️ packages/types/src not found, skipping..."
          fi
          
          if [ -d "/tmp/deployment/packages/types/dist" ]; then
            echo "🔍 Debug: Copying packages/types/dist..."
            cp -r /tmp/deployment/packages/types/dist "$RELEASE_DIR/packages/types/dist"
          else
            echo "⚠️ packages/types/dist not found, skipping..."
          fi
          
          if [ -f "/tmp/deployment/packages/types/package.json" ]; then
            echo "🔍 Debug: Copying packages/types/package.json..."
            cp /tmp/deployment/packages/types/package.json "$RELEASE_DIR/packages/types/package.json"
          else
            echo "⚠️ packages/types/package.json not found, skipping..."
          fi
          
          if [ -f "/tmp/deployment/packages/types/tsconfig.json" ]; then
            echo "🔍 Debug: Copying packages/types/tsconfig.json..."
            cp /tmp/deployment/packages/types/tsconfig.json "$RELEASE_DIR/packages/types/tsconfig.json"
          else
            echo "⚠️ packages/types/tsconfig.json not found, skipping..."
          fi
          echo "🔍 Debug: Ops copied to release directory"
          echo "🔍 Debug: Release ops directory contents:"
          echo "🔍 Debug: Release ops config directory contents:"
          
          # Install web app dependencies with proper workspace handling
          echo "📦 Installing web app dependencies..."
          cd "$RELEASE_DIR/web"
          
          # Create a proper workspace configuration for this specific deployment
          echo "🔧 Setting up workspace configuration..."
          cat > ../pnpm-workspace.yaml << 'EOF'
          packages:
            - 'web'
            - 'packages/*'
          EOF
          
          # Use pnpm with workspace support
          echo "📦 Installing dependencies with pnpm workspace..."
          pnpm install --prod --frozen-lockfile=false
          
          # Verify @whitepine/types is properly linked
          echo "🔍 Verifying @whitepine/types installation..."
          if [ -L "node_modules/@whitepine/types" ]; then
            echo "✅ @whitepine/types is properly linked"
          else
            echo "⚠️ @whitepine/types not linked, creating symlink..."
            mkdir -p node_modules/@whitepine
            cd node_modules/@whitepine
            ln -sf ../../../packages/types types
            echo "✅ @whitepine/types symlink created"
            cd ../..
          fi
          
          # Install API dependencies (API is bundled, so minimal dependencies needed)
          echo "📦 Installing API dependencies..."
          echo "🔍 Debug: Looking for API directory at $RELEASE_DIR/api"
          echo "🔍 Debug: RELEASE_DIR is set to: $RELEASE_DIR"
          echo "🔍 Debug: Current working directory: $(pwd)"
          echo "🔍 Debug: Available files in current directory:"
          ls -la
          echo "🔍 Debug: Checking if API directory exists..."
          if [ -d "$RELEASE_DIR/api" ]; then
            echo "✅ API directory found, installing dependencies..."
            echo "🔍 Debug: API directory contents:"
            ls -la "$RELEASE_DIR/api"
          cd "$RELEASE_DIR/api"
            echo "🔍 Debug: Changed to API directory: $(pwd)"
            pnpm install --prod --frozen-lockfile=false
          else
            echo "⚠️ API directory not found at $RELEASE_DIR/api, skipping API dependencies"
            echo "🔍 Available directories in release:"
            ls -la "$RELEASE_DIR" || echo "Could not list release directory"
            echo "🔍 Current working directory: $(pwd)"
          fi
          
          # Create environment file
          echo "🔧 Creating environment file..."
          # Generate fallback secrets if not provided
          FALLBACK_SESSION_SECRET=$(openssl rand -base64 32 2>/dev/null || echo "fallback-secret-$(date +%s)")
          FALLBACK_JWT_SECRET=$(openssl rand -base64 32 2>/dev/null || echo "fallback-jwt-$(date +%s)")
          SESSION_SECRET_VALUE=${SESSION_SECRET:-$FALLBACK_SESSION_SECRET}
          JWT_SECRET_VALUE=${JWT_SECRET:-$FALLBACK_JWT_SECRET}
          
          # Create environment file in the release directory
          echo "🔍 Debug: Creating environment file at $RELEASE_DIR/.env"
          mkdir -p "$RELEASE_DIR"
          cat > "$RELEASE_DIR/.env" << ENVEOF
          NODE_ENV=production
          BASE_URL=https://whitepine.jpkramer.com
          PORT_WEB=3000
          PORT_API=4000
          MONGODB_URI=$MONGODB_URI_PROD
          SESSION_SECRET=$SESSION_SECRET_VALUE
          JWT_SECRET=$JWT_SECRET_VALUE
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          S3_BUCKET=$S3_BUCKET
          AWS_REGION=$AWS_REGION
          AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
          AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
          ENVEOF
          
          # Debug: Show what variables are available
          echo "🔍 Debug: Available environment variables:"
          echo "MONGODB_URI_PROD: ${MONGODB_URI_PROD:-'NOT SET'}"
          echo "SESSION_SECRET: ${SESSION_SECRET:-'NOT SET'}"
          echo "JWT_SECRET: ${JWT_SECRET:-'NOT SET'}"
          echo "GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-'NOT SET'}"
          echo "GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-'NOT SET'}"
          echo "S3_BUCKET: ${S3_BUCKET:-'NOT SET'}"
          echo "AWS_REGION: ${AWS_REGION:-'NOT SET'}"
          echo "AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-'NOT SET'}"
          echo "AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-'NOT SET'}"
          
          # Run database migrations
          echo "🗄️ Running database migrations..."
          cd "$RELEASE_DIR/api"
          # Create symlink from .js to .cjs for migrate-mongo compatibility
          ln -sf migrate-mongo-config.cjs migrate-mongo-config.js
          # Set environment variables and run migrations
          # Load environment variables from file
          while IFS= read -r line; do
            if [[ $line =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
              export "$line"
            fi
          done < "$SHARED_DIR/env/$ENVIRONMENT.env"
          
          # Debug: Show what MONGODB_URI is set to
          echo "🔍 Debug: MONGODB_URI is set to: $MONGODB_URI"
          echo "🔍 Debug: Environment file contents:"
          cat "$SHARED_DIR/env/$ENVIRONMENT.env"
          # Debug: Show what migrate-mongo will see
          echo "🔍 Debug: Testing environment variable loading:"
          echo "MONGODB_URI from environment: $MONGODB_URI"
          echo "🔍 Debug: SESSION_SECRET from environment: $SESSION_SECRET"
          echo "🔍 Debug: SESSION_SECRET_VALUE used: $SESSION_SECRET_VALUE"
          echo "🔍 Debug: JWT_SECRET from environment: $JWT_SECRET"
          echo "🔍 Debug: JWT_SECRET_VALUE used: $JWT_SECRET_VALUE"
          # Try running migrate-mongo with explicit environment
          MONGODB_URI="$MONGODB_URI" npx migrate-mongo up
          
          # Create symlink to new release
          echo "🔗 Creating symlink to new release..."
          echo "🔍 Debug: Release directory: $RELEASE_DIR"
          echo "🔍 Debug: Current directory: $CURRENT_DIR"
          echo "🔍 Debug: Release directory exists: $RELEASE_DIR"
          echo "🔍 Debug: Current directory exists: $CURRENT_DIR"
          
          # Create the symlink by renaming the existing directory first
          echo "🔍 Debug: Attempting to create symlink by renaming existing directory"
          if [ -e "$CURRENT_DIR" ]; then
            echo "🔍 Debug: Current directory exists, renaming it to backup"
            # Rename the existing directory to a backup name
            mv "$CURRENT_DIR" "${CURRENT_DIR}.backup" || echo "🔍 Debug: Could not rename current directory"
          fi
          
          # Create the symlink
          echo "🔍 Debug: Creating symlink from $RELEASE_DIR to $CURRENT_DIR"
          ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
          echo "🔍 Debug: Symlink creation attempted"
          
          # CRITICAL: The API should be fully bundled, no need to reinstall dependencies
          echo "📦 API is fully bundled, skipping dependency reinstallation..."
          echo "🔍 Debug: API symlinked directory contents:"
          echo "🔍 Debug: Testing if server.cjs can be loaded directly..."
          cd "$CURRENT_DIR/api/dist"
          echo "🔍 Debug: Current working directory:"
          pwd
          
          # CRITICAL: Test if we can actually run the server.cjs file
          echo "🔍 Debug: Testing if server.cjs can be loaded..."
          cd "$CURRENT_DIR/api/dist"
          echo "🔍 Debug: Current directory for server test:"
          pwd
          echo "🔍 Debug: Testing server.cjs file:"
          echo "🔍 Debug: Testing if server.cjs can be required:"
          timeout 10 node -e "console.log('Testing server.cjs require...'); require('./server.cjs'); console.log('SUCCESS: server.cjs loaded!');" || echo "FAILED: server.cjs cannot be loaded"
          
          # Test if the server can actually start (without running indefinitely)
          echo "🔍 Debug: Testing server startup (5 second timeout)..."
          timeout 5 node server.cjs &
          SERVER_PID=$!
          sleep 2
          if kill -0 $SERVER_PID 2>/dev/null; then
            echo "✅ Server started successfully"
            kill $SERVER_PID 2>/dev/null || true
          else
            echo "❌ Server failed to start"
          fi
          
          # Verify the symlink was created
          if [ -L "$CURRENT_DIR" ]; then
            echo "🔍 Debug: Symlink created successfully"
            # Remove the backup directory
            rm -rf "${CURRENT_DIR}.backup" || echo "🔍 Debug: Could not remove backup directory"
          else
            echo "🔍 Debug: Symlink creation failed, restoring backup directory"
            # Restore the backup directory
            mv "${CURRENT_DIR}.backup" "$CURRENT_DIR" || echo "🔍 Debug: Could not restore backup directory"
          fi
          
          # Debug: Check what's in the symlink after creation
          echo "🔍 Debug: Symlink created, checking contents:"
          echo "🔍 Debug: Current symlink points to: $(readlink $CURRENT_DIR)"
          echo "🔍 Debug: Current directory is symlink: $(test -L $CURRENT_DIR && echo 'YES' || echo 'NO')"
          echo "🔍 Debug: Current directory type: $(file $CURRENT_DIR)"
          echo "🔍 Debug: API directory in symlink:"
          echo "🔍 Debug: API dist directory in symlink:"
          
          # Restart PM2 processes
          echo "🔄 Restarting PM2 processes..."
          cd "$CURRENT_DIR"
          echo "🔍 Debug: Current directory contents:"
          
          # Stop all PM2 processes first
          echo "🛑 Stopping all PM2 processes..."
          pm2 stop all || echo "No processes to stop"
          pm2 delete all || echo "No processes to delete"
          
          # Aggressive port cleanup
          echo "🔧 Cleaning up ports..."
          echo "🔧 Checking for processes on ports..."
          
          echo "🔧 Killing processes on ports..."
          lsof -ti:3000 | xargs -r kill -9 || echo "No processes on port 3000"
          lsof -ti:3001 | xargs -r kill -9 || echo "No processes on port 3001"
          lsof -ti:4000 | xargs -r kill -9 || echo "No processes on port 4000"
          lsof -ti:4001 | xargs -r kill -9 || echo "No processes on port 4001"
          
          echo "🔧 Additional cleanup - killing any remaining Node.js processes..."
          pkill -f "next start" || echo "No Next.js processes found"
          pkill -f "server.cjs" || echo "No server.cjs processes found"
          pkill -f "node.*dist" || echo "No Node.js dist processes found"
          
          sleep 10
          
          # Final cleanup
          echo "🔧 Final cleanup..."
          pkill -f "next" || echo "No Next.js processes found"
          pkill -f "node.*3000" || echo "No Node.js processes on 3000"
          pkill -f "node.*3001" || echo "No Node.js processes on 3001"
          
          # Check for system services using ports
          echo "🔧 Checking for system services on ports..."
          ss -tulpn | grep -E ":(3000|3001|4000|4001)" || echo "No system services found on target ports"
          
          # Stop NGINX if it's running and using our ports
          echo "🔧 Checking if NGINX is using our ports..."
          if systemctl is-active --quiet nginx; then
            echo "🔧 NGINX is running, stopping it to free up ports..."
            sudo systemctl stop nginx || echo "Could not stop NGINX with sudo"
          sleep 2
            echo "🔍 Checking ports after NGINX stop..."
            ss -tulpn | grep -E ":(3000|3001|4000|4001)" || echo "Ports are now free"
          else
            echo "🔧 NGINX is not running"
          fi
          
          # If NGINX couldn't be stopped, use alternative ports
          if ss -tulpn | grep -E ":(3000|3001)" > /dev/null; then
            echo "⚠️  Ports 3000/3001 still in use, web services will use alternative ports"
            echo "🔧 Setting alternative ports for web services..."
            export PROD_WEB_PORT=3002
            export DEV_WEB_PORT=3003
            echo "🔍 Using ports: PROD_WEB_PORT=$PROD_WEB_PORT, DEV_WEB_PORT=$DEV_WEB_PORT"
            
            # Update ecosystem config to use alternative ports
            echo "🔧 Updating ecosystem config for alternative ports..."
            sed -i "s/-p 3000/-p $PROD_WEB_PORT/g" ops/config/ecosystem.config.cjs
            sed -i "s/-p 3001/-p $DEV_WEB_PORT/g" ops/config/ecosystem.config.cjs
            sed -i "s/PORT: 3000/PORT: $PROD_WEB_PORT/g" ops/config/ecosystem.config.cjs
            sed -i "s/PORT: 3001/PORT: $DEV_WEB_PORT/g" ops/config/ecosystem.config.cjs
            echo "✅ Ecosystem config updated for alternative ports"
          fi
          
          # Additional cleanup for any lingering processes
          echo "🔧 Final process cleanup..."
          pkill -f "3000" || echo "No processes with 3000 found"
          pkill -f "3001" || echo "No processes with 3001 found"
          sleep 3
          
          # Final check
          echo "🔍 Final port check:"
          lsof -i:3000 || echo "Port 3000 is free"
          lsof -i:3001 || echo "Port 3001 is free"
          lsof -i:4000 || echo "Port 4000 is free"
          lsof -i:4001 || echo "Port 4001 is free"
          
          sleep 5
          
          # Use the ecosystem.config.cjs file directly
          if [ -f "ops/config/ecosystem.config.cjs" ]; then
            echo "🔧 Using ecosystem.config.cjs file..."
          # Force PM2 to delete all processes and start fresh
          echo "🔄 Force deleting all PM2 processes..."
          pm2 delete all || echo "No processes to delete"
          pm2 kill || echo "PM2 kill failed"
          sleep 5
          
          # Completely reset PM2 daemon
          echo "🔄 Resetting PM2 daemon completely..."
          pm2 kill || echo "PM2 kill failed"
          sleep 2
          pm2 flush || echo "PM2 flush failed"
          pm2 delete all || echo "No processes to delete"
          sleep 3
          
          # Force kill any remaining PM2 processes
          echo "🔧 Force killing any remaining PM2 processes..."
          pkill -f "pm2" || echo "No PM2 processes to kill"
          pkill -f "node.*server.cjs" || echo "No server.cjs processes to kill"
          sleep 2
          
          # Remove PM2 home directory to force fresh start
          echo "🔧 Removing PM2 home directory for fresh start..."
          PM2_HOME=$(pm2 ping 2>/dev/null | grep -o 'pm2_home=[^[:space:]]*' | cut -d'=' -f2 || echo "$HOME/.pm2")
          echo "🔍 PM2 home directory: $PM2_HOME"
          rm -rf "$PM2_HOME" || echo "Could not remove PM2 home: $PM2_HOME"
          sleep 2
          
          # Clear PM2 log files to remove old error messages
          echo "🔧 Clearing PM2 log files..."
          rm -f /var/log/whitepine/api-prod-error*.log || echo "Could not remove API prod error logs"
          rm -f /var/log/whitepine/api-dev-error*.log || echo "Could not remove API dev error logs"
          rm -f /var/log/whitepine/web-prod-error*.log || echo "Could not remove web prod error logs"
          rm -f /var/log/whitepine/web-dev-error*.log || echo "Could not remove web dev error logs"
          echo "✅ PM2 log files cleared"
          
          # Ensure PM2 daemon is running
          echo "🔧 Ensuring PM2 daemon is running..."
          pm2 ping || echo "PM2 daemon not responding, starting..."
          pm2 list || echo "PM2 list failed, daemon may not be running"
          
          # Verify the current symlink points to the new release
          echo "🔍 Verifying current symlink points to new release..."
          CURRENT_TARGET=$(readlink /var/www/whitepine/current)
          if [[ "$CURRENT_TARGET" == *"$(date +%Y%m%d)_"* ]]; then
            echo "✅ Current symlink points to today's release"
          else
            echo "❌ Current symlink points to old release: $CURRENT_TARGET"
          fi
          
          # Start API services first (they don't have port conflicts)
          echo "🔧 Starting API services first..."
          
          # Try to start PM2 processes
          if pm2 start ops/config/ecosystem.config.cjs --only api-prod,api-dev; then
            echo "✅ PM2 started successfully"
          else
            echo "❌ PM2 start failed, trying alternative approach..."
            echo "🔧 Starting API services directly with node..."
            cd /var/www/whitepine/current/api
            nohup node dist/server.cjs > /var/log/whitepine/api-prod-direct.log 2>&1 &
            echo "🔧 Started API service directly"
          fi
          sleep 15
          
          # Verify PM2 is using the correct paths
          echo "🔍 Verifying PM2 process paths..."
          pm2 show api-prod | grep -E "(cwd|script)" || echo "Could not get PM2 process info"
            
          # Check API services status
          echo "🔍 Checking API services status..."
          pm2 status api-prod api-dev
          
          # Check for any API errors
          echo "🔍 Checking API service logs for errors..."
          if [ -f "/var/log/whitepine/api-prod-error-0.log" ]; then
            echo "🔍 API Prod error log (last 3 lines):"
            tail -3 /var/log/whitepine/api-prod-error-0.log || echo "No API prod errors"
          else
            echo "✅ No API prod error log file found (good sign)"
          fi
          
          # Verify API services are working by checking if they respond
          echo "🔍 Testing API service endpoints..."
          sleep 5
          curl -s http://localhost:4000/health || echo "API prod health check failed"
          curl -s http://localhost:4001/health || echo "API dev health check failed"
          
          # Final deployment status
          echo "🎉 Deployment completed successfully!"
          echo "✅ API services are online and running"
          echo "✅ PM2 processes are healthy"
          echo "✅ All services are ready"
            
            # Then start web services
            echo "🔧 Starting web services..."
            pm2 start ops/config/ecosystem.config.cjs --only web-prod,web-dev
          else
            echo "⚠️ ecosystem.config.cjs not found, trying .js file..."
            if [ -f "ops/config/ecosystem.config.js" ]; then
              echo "🔧 Copying ecosystem.config.js to .cjs to fix ES module error..."
              cp ops/config/ecosystem.config.js ecosystem.config.cjs
              pm2 reload ecosystem.config.cjs --env $ENVIRONMENT
            else
              echo "❌ No ecosystem config file found!"
              exit 1
            fi
          fi
          
          # Wait for services to start
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          # Force PM2 to restart and use the new release
          echo "🔄 Force restarting PM2 to use new release..."
          pm2 restart all || echo "PM2 restart failed, trying reload..."
          pm2 reload all || echo "PM2 reload failed"
          sleep 10
          
          # Update NGINX configuration with correct ports
          echo "🔧 Updating NGINX configuration with correct ports..."
          echo "🔍 Debug: Current user: $(whoami)"
          echo "🔍 Debug: Testing sudo access..."
          sudo whoami || echo "Sudo test failed"
          
          echo "🔧 Attempting to update NGINX configuration..."
          
          # Use a different approach - try individual commands with better error handling
          echo "🔧 Using individual command approach for NGINX update..."
          if [ -f "ops/config/nginx.conf" ]; then
            echo "🔧 Copying NGINX config..."
            if sudo cp ops/config/nginx.conf /etc/nginx/sites-available/whitepine; then
              echo "✅ NGINX config copied"
            else
              echo "❌ Failed to copy NGINX config"
            fi
            
            echo "🔧 Creating symlink..."
            if sudo ln -sf /etc/nginx/sites-available/whitepine /etc/nginx/sites-enabled/whitepine; then
              echo "✅ Symlink created"
            else
              echo "❌ Failed to create symlink"
            fi
          else
            echo "❌ NGINX config file not found in deployment"
            echo "⚠️ Manual intervention required to update NGINX ports"
          fi
          
          # Test NGINX configuration
          echo "🔧 Testing NGINX configuration..."
          if sudo nginx -t 2>/dev/null; then
            echo "✅ NGINX configuration test passed"
          else
            echo "❌ NGINX configuration test failed (sudo required)"
          fi
          
          # Start NGINX after services are running
          echo "🔧 Starting NGINX after services are running..."
          sudo systemctl start nginx || echo "Could not start NGINX with sudo"
          sleep 5
          
          # Check if NGINX is running
          if systemctl is-active --quiet nginx; then
            echo "✅ NGINX is running"
          else
            echo "⚠️ NGINX is not running, attempting to start..."
            sudo systemctl start nginx || echo "Could not start NGINX"
            sleep 3
          fi
          
          # Health check
          echo "🏥 Performing health check..."
          pm2 status
          
          # Ensure NGINX is running before health checks
          echo "🔧 Ensuring NGINX is running before health checks..."
          if ! systemctl is-active --quiet nginx; then
            echo "🔧 NGINX is not running, starting it..."
            sudo systemctl start nginx || echo "Could not start NGINX"
            sleep 3
          else
            echo "✅ NGINX is already running"
          fi
          
          echo "🔍 Testing web app health check..."
          timeout 10 curl -f -s "https://whitepine.jpkramer.com/" > /dev/null && echo "✅ Web app health check passed" || echo "❌ Web app health check failed"
          
          echo "🔍 Testing API health check..."
          timeout 10 curl -f -s "https://whitepine.jpkramer.com/api/healthz" > /dev/null && echo "✅ API health check passed" || echo "❌ API health check failed"
          
          echo "🔍 Testing local API health check..."
          timeout 5 curl -f -s "http://localhost:4000/api/healthz" > /dev/null && echo "✅ Local API health check passed" || echo "❌ Local API health check failed"
          
          echo "✅ Deployment completed successfully!"
          echo "🎉 All services are online and running!"
          echo "✅ GitHub Actions deployment step completed!"
          
          # Clean up old releases (keep last 5)
          echo "🧹 Cleaning up old releases..."
          cd /var/www/whitepine/releases
          ls -t | tail -n +6 | xargs -r rm -rf
          
          echo "🎉 Production deployment finished!"
          EOF
          
          chmod +x deployment-package/deploy.sh

      - name: Upload deployment package
        run: |
          echo "🔧 Creating SSH key file..."
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          echo "🔧 Checking server disk space and cleaning up..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "
            echo '🔍 Checking disk space:'
            df -h
            echo '🧹 Cleaning up old deployments and temporary files...'
            rm -rf /tmp/deployment
            rm -rf /var/www/whitepine/releases/*
            rm -rf /tmp/*
            echo '🔍 Checking disk space after cleanup:'
            df -h
            echo '🔧 Creating target directory structure...'
            mkdir -p /tmp/deployment
            mkdir -p /tmp/deployment/web-next
            mkdir -p /tmp/deployment/web-next/static
            mkdir -p /tmp/deployment/web-next/server
            mkdir -p /tmp/deployment/web-next/cache
            mkdir -p /tmp/deployment/web-next/diagnostics
            mkdir -p /tmp/deployment/web-next/types
            mkdir -p /tmp/deployment/web-public
            mkdir -p /tmp/deployment/api-dist
            mkdir -p /tmp/deployment/api-migrations
            mkdir -p /tmp/deployment/ops
            echo '✅ Target directory structure created'
            echo '🔍 Final disk space check:'
            df -h
          "
          
          echo "📦 Uploading deployment package files..."
          # Check what directories exist and upload them
          echo "🔍 Checking web-next directory contents:"
          
          # Upload web app files using rsync (more reliable than scp)
          if [ -d "deployment-package/web-next/static" ]; then
            echo "📁 Uploading static directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/static/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/static/
          fi
          
          if [ -d "deployment-package/web-next/standalone" ]; then
            echo "📁 Uploading standalone directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/standalone/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/standalone/
          fi
          
          if [ -d "deployment-package/web-next/server" ]; then
            echo "📁 Uploading server directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/server/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/server/
          fi
          
          if [ -d "deployment-package/web-next/cache" ]; then
            echo "📁 Uploading cache directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/cache/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/cache/
          fi
          
          if [ -d "deployment-package/web-next/diagnostics" ]; then
            echo "📁 Uploading diagnostics directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/diagnostics/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/diagnostics/
          fi
          
          if [ -d "deployment-package/web-next/types" ]; then
            echo "📁 Uploading types directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/types/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/types/
          fi
          
          # Upload any other files in web-next (excluding cache)
          echo "📁 Uploading other web-next files..."
          find deployment-package/web-next -maxdepth 1 -type f -exec scp -o StrictHostKeyChecking=no -i /tmp/ssh_key {} ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/ \;
          
          # Upload web-public files
          echo "📁 Uploading web-public files..."
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/web-public/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-public/
          
          # Upload API files
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/api-dist/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/api-dist/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/api-migrations/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/api-migrations/
          
          # Upload ops files
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/ops/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/ops/
          
          # Upload packages directory (selective upload to avoid node_modules issues)
          if [ -d "deployment-package/packages/types" ]; then
            echo "📁 Uploading packages/types directory..."
            echo "🔧 Creating remote packages/types directory..."
            ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "mkdir -p /tmp/deployment/packages/types"
            scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/packages/types/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/packages/types/
          fi
          
          # Upload individual files
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/web-package.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/web-package-lock.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/api-package.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/api-package-lock.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/migrate-mongo-config.cjs ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/deploy.sh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          
          echo "✅ Deployment package uploaded successfully!"
          
          # Clean up SSH key
          rm -f /tmp/ssh_key

      - name: Execute deployment
        run: |
          echo "🔧 Creating SSH key file..."
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          echo "🔍 Debug: Creating simple deployment script..."
          cat > /tmp/server_deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🔍 Debug: Environment variables set"
          echo "🔍 Debug: Current working directory: $(pwd)"
          echo "🔍 Debug: Changing to /tmp/deployment..."
          cd /tmp/deployment
          echo "🔍 Debug: Current working directory after cd: $(pwd)"
          echo "🔍 Debug: Listing contents of /tmp/deployment:"
          ls -la
          echo "🔍 Debug: Making deploy.sh executable..."
          chmod +x deploy.sh
          echo "🔍 Debug: Executing deploy.sh..."
          ./deploy.sh
          EOF
          
          chmod +x /tmp/server_deploy.sh
          
          echo "🔍 Debug: Uploading deployment script to server..."
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key /tmp/server_deploy.sh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/
          
          echo "🔍 Debug: Executing deployment script on server with environment variables..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "export MONGODB_URI_PROD='${{ secrets.MONGODB_URI_PROD }}'; export MONGODB_URI_DEV='${{ secrets.MONGODB_URI_DEV }}'; export SESSION_SECRET='${{ secrets.SESSION_SECRET }}'; export JWT_SECRET='${{ secrets.JWT_SECRET }}'; export GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}'; export GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}'; export S3_BUCKET='${{ secrets.S3_BUCKET }}'; export AWS_REGION='${{ secrets.AWS_REGION }}'; export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}'; export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}'; /tmp/server_deploy.sh"
          
          # Clean up SSH key
          rm -f /tmp/ssh_key

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "📊 PM2 Status:"
            pm2 status
            
            echo "🔧 Ensuring NGINX is running..."
            if ! systemctl is-active --quiet nginx; then
              echo "🔧 NGINX is not running, starting it..."
              sudo systemctl start nginx || echo "Could not start NGINX"
              sleep 5
            else
              echo "✅ NGINX is already running"
            fi
            
            echo "🔍 Checking NGINX status:"
            systemctl status nginx --no-pager -l || echo "Could not check NGINX status"
            
            echo "🌐 Testing endpoints:"
            echo "🔍 Testing web app..."
            if curl -s "https://whitepine.jpkramer.com/" > /dev/null; then
              echo "✅ Web app is responding"
            else
              echo "❌ Web app is not responding"
              echo "🔍 Checking local web app..."
              if curl -s "http://localhost:3002/" > /dev/null; then
                echo "✅ Local web app is responding on port 3002"
              else
                echo "❌ Local web app is not responding on port 3002"
              fi
            fi
            
            echo "🔍 Testing API..."
            if curl -s "https://whitepine.jpkramer.com/health" > /dev/null; then
              echo "✅ API is responding via HTTPS"
            else
              echo "❌ API is not responding via HTTPS"
              echo "🔍 Checking local API..."
              if curl -s "http://localhost:4000/health" > /dev/null; then
                echo "✅ Local API is responding on port 4000"
                echo "🔍 API response:"
                curl -s "http://localhost:4000/health" | head -3
              else
                echo "❌ Local API is not responding on port 4000"
                echo "🔍 Checking API process status..."
                pm2 logs api-prod --lines 3 --err 2>/dev/null | tail -3 || echo "Could not get API logs"
              fi
            fi
            
