name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build applications
        run: pnpm build

      - name: Create deployment package
        run: |
          mkdir -p deployment-package
          
          # Copy web app build
          cp -r apps/web/.next deployment-package/web-next
          cp -r apps/web/public deployment-package/web-public
          # Note: package.json will be copied after modification
          
          # Copy API build
          cp -r apps/api/dist deployment-package/api-dist
          cp -r apps/api/migrations deployment-package/api-migrations
          cp apps/api/config/migrate-mongo-config.js deployment-package/migrate-mongo-config.cjs
          # Note: package.json will be copied after modification
          
          # Generate npm lockfiles for deployment
          echo "📦 Generating npm lockfiles for deployment..."
          
          # First, resolve workspace dependencies by reading the actual version from packages/types
          echo "🔧 Resolving workspace dependencies..."
          TYPES_VERSION=$(node -e "const pkg = JSON.parse(require('fs').readFileSync('packages/types/package.json', 'utf8')); console.log(pkg.version);")
          echo "📝 Types package version: $TYPES_VERSION"
          
          # Create npm-compatible package.json files with resolved versions
          echo "🔧 Creating npm-compatible package.json files..."
          
          # For web app
          cd apps/web
          cp package.json package.json.backup
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.dependencies['@whitepine/types'] = '$TYPES_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --omit=dev --package-lock-only
          cp package-lock.json ../../deployment-package/web-package-lock.json
          cp package.json ../../deployment-package/web-package.json  # Copy modified package.json
          rm package-lock.json
          mv package.json.backup package.json
          
          # For API
          cd ../api
          cp package.json package.json.backup
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.dependencies['@whitepine/types'] = '$TYPES_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --omit=dev --package-lock-only
          cp package-lock.json ../../deployment-package/api-package-lock.json
          cp package.json ../../deployment-package/api-package.json  # Copy modified package.json
          rm package-lock.json
          mv package.json.backup package.json
          
          cd ../..
          
          # Copy ops configuration
          cp -r apps/ops deployment-package/ops
          
          # Create deployment script
          cat > deployment-package/deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          ENVIRONMENT=prod
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          RELEASE_DIR="/var/www/whitepine/releases/$TIMESTAMP"
          CURRENT_DIR="/var/www/whitepine/current"
          SHARED_DIR="/var/www/whitepine/shared"
          
          echo "🚀 Starting deployment for environment: $ENVIRONMENT"
          echo "📦 Release directory: $RELEASE_DIR"
          echo "🔍 Debug: Deployment script version: $(date)"
          echo "🔍 Debug: This deployment includes API dependency reinstallation fix"
          
          # Create release directory
          mkdir -p "$RELEASE_DIR"
          
          # Copy web app
          mkdir -p "$RELEASE_DIR/web"
          cp -r web-next "$RELEASE_DIR/web/.next"
          cp -r web-public "$RELEASE_DIR/web/public"
          cp web-package.json "$RELEASE_DIR/web/package.json"
          cp web-package-lock.json "$RELEASE_DIR/web/package-lock.json"
          
          # Copy API
          echo "🔧 Copying API files..."
          echo "🔍 Debug: API source directories:"
          ls -la api-dist/ || echo "api-dist not found"
          ls -la api-migrations/ || echo "api-migrations not found"
          echo "🔍 Debug: Creating API directory: $RELEASE_DIR/api"
          mkdir -p "$RELEASE_DIR/api"
          echo "🔍 Debug: Copying API dist files..."
          cp -r api-dist "$RELEASE_DIR/api/dist"
          echo "🔍 Debug: Copying API migrations..."
          cp -r api-migrations "$RELEASE_DIR/api/migrations"
          echo "🔍 Debug: Copying API package files..."
          cp api-package.json "$RELEASE_DIR/api/package.json"
          cp api-package-lock.json "$RELEASE_DIR/api/package-lock.json"
          cp migrate-mongo-config.cjs "$RELEASE_DIR/api/migrate-mongo-config.cjs"
          echo "🔍 Debug: API directory after copying:"
          ls -la "$RELEASE_DIR/api/"
          echo "🔍 Debug: API dist directory after copying:"
          ls -la "$RELEASE_DIR/api/dist/" || echo "API dist not found after copying"
          
          # Copy ops
          echo "🔍 Debug: Copying ops directory..."
          echo "🔍 Debug: Ops source directory contents:"
          ls -la ops/ || echo "Ops directory not found"
          echo "🔍 Debug: Ops config directory contents:"
          ls -la ops/config/ || echo "Ops config directory not found"
          cp -r ops "$RELEASE_DIR/ops"
          echo "🔍 Debug: Ops copied to release directory"
          echo "🔍 Debug: Release ops directory contents:"
          ls -la "$RELEASE_DIR/ops/" || echo "Release ops directory not found"
          echo "🔍 Debug: Release ops config directory contents:"
          ls -la "$RELEASE_DIR/ops/config/" || echo "Release ops config directory not found"
          
          # Install dependencies
          echo "📦 Installing web app dependencies..."
          cd "$RELEASE_DIR/web"
          npm ci --omit=dev
          
          echo "📦 Installing API dependencies..."
          cd "$RELEASE_DIR/api"
          npm ci --omit=dev
          
          # Create environment file
          echo "🔧 Creating environment file..."
          cat > "$SHARED_DIR/env/$ENVIRONMENT.env" << ENVEOF
          NODE_ENV=production
          BASE_URL=https://whitepine.jpkramer.com
          PORT_WEB=3000
          PORT_API=4000
          MONGODB_URI=$MONGODB_URI_PROD
          SESSION_SECRET=$SESSION_SECRET
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          S3_BUCKET=$S3_BUCKET
          AWS_REGION=$AWS_REGION
          AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
          AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
          ENVEOF
          
          # Debug: Show what variables are available
          echo "🔍 Debug: Available environment variables:"
          echo "MONGODB_URI_PROD: ${MONGODB_URI_PROD:-'NOT SET'}"
          echo "SESSION_SECRET: ${SESSION_SECRET:-'NOT SET'}"
          echo "GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-'NOT SET'}"
          
          # Run database migrations
          echo "🗄️ Running database migrations..."
          cd "$RELEASE_DIR/api"
          # Create symlink from .js to .cjs for migrate-mongo compatibility
          ln -sf migrate-mongo-config.cjs migrate-mongo-config.js
          # Set environment variables and run migrations
          # Load environment variables from file
          while IFS= read -r line; do
            if [[ $line =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
              export "$line"
            fi
          done < "$SHARED_DIR/env/$ENVIRONMENT.env"
          
          # Debug: Show what MONGODB_URI is set to
          echo "🔍 Debug: MONGODB_URI is set to: $MONGODB_URI"
          echo "🔍 Debug: Environment file contents:"
          cat "$SHARED_DIR/env/$ENVIRONMENT.env"
          # Debug: Show what migrate-mongo will see
          echo "🔍 Debug: Testing environment variable loading:"
          echo "MONGODB_URI from environment: $MONGODB_URI"
          # Try running migrate-mongo with explicit environment
          MONGODB_URI="$MONGODB_URI" npx migrate-mongo up
          
          # Create symlink to new release
          echo "🔗 Creating symlink to new release..."
          echo "🔍 Debug: Release directory: $RELEASE_DIR"
          echo "🔍 Debug: Current directory: $CURRENT_DIR"
          echo "🔍 Debug: Release directory exists: $(ls -la $RELEASE_DIR || echo 'RELEASE_DIR not found')"
          echo "🔍 Debug: Current directory exists: $(ls -la $CURRENT_DIR || echo 'CURRENT_DIR not found')"
          
          # Create the symlink by renaming the existing directory first
          echo "🔍 Debug: Attempting to create symlink by renaming existing directory"
          if [ -e "$CURRENT_DIR" ]; then
            echo "🔍 Debug: Current directory exists, renaming it to backup"
            # Rename the existing directory to a backup name
            mv "$CURRENT_DIR" "${CURRENT_DIR}.backup" || echo "🔍 Debug: Could not rename current directory"
          fi
          
          # Create the symlink
          echo "🔍 Debug: Creating symlink from $RELEASE_DIR to $CURRENT_DIR"
          ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"
          echo "🔍 Debug: Symlink creation attempted"
          
          # CRITICAL: Reinstall API dependencies in the symlinked directory
          echo "📦 Reinstalling API dependencies in symlinked directory..."
          cd "$CURRENT_DIR/api"
          echo "🔍 Debug: API symlinked directory contents:"
          ls -la
          echo "🔍 Debug: Checking if node_modules exists:"
          ls -la node_modules/ | head -5 || echo "node_modules not found"
          echo "🔍 Debug: Current working directory:"
          pwd
          echo "🔍 Debug: Reinstalling dependencies with timeout..."
          timeout 30 npm ci --omit=dev || echo "npm ci failed or timed out"
          echo "🔍 Debug: Checking if express is now installed:"
          ls -la node_modules/express/ || echo "express still not found"
          echo "🔍 Debug: Testing if we can require express:"
          node -e "console.log('Express version:', require('express/package.json').version)" || echo "Cannot require express"
          
          # CRITICAL: Test if we can actually run the server.cjs file
          echo "🔍 Debug: Testing if server.cjs can be loaded..."
          cd "$CURRENT_DIR/api/dist"
          echo "🔍 Debug: Current directory for server test:"
          pwd
          echo "🔍 Debug: Testing server.cjs file:"
          ls -la server.cjs || echo "server.cjs not found"
          echo "🔍 Debug: Testing if server.cjs can be required:"
          node -e "console.log('Testing server.cjs require...'); require('./server.cjs'); console.log('SUCCESS: server.cjs loaded!');" || echo "FAILED: server.cjs cannot be loaded"
          
          # Verify the symlink was created
          if [ -L "$CURRENT_DIR" ]; then
            echo "🔍 Debug: Symlink created successfully"
            # Remove the backup directory
            rm -rf "${CURRENT_DIR}.backup" || echo "🔍 Debug: Could not remove backup directory"
          else
            echo "🔍 Debug: Symlink creation failed, restoring backup directory"
            # Restore the backup directory
            mv "${CURRENT_DIR}.backup" "$CURRENT_DIR" || echo "🔍 Debug: Could not restore backup directory"
          fi
          
          # Debug: Check what's in the symlink after creation
          echo "🔍 Debug: Symlink created, checking contents:"
          echo "🔍 Debug: Current symlink points to: $(readlink $CURRENT_DIR)"
          echo "🔍 Debug: Current directory is symlink: $(test -L $CURRENT_DIR && echo 'YES' || echo 'NO')"
          echo "🔍 Debug: Current directory type: $(file $CURRENT_DIR)"
          echo "🔍 Debug: API directory in symlink:"
          ls -la "$CURRENT_DIR/api/" || echo "API directory not found in symlink"
          echo "🔍 Debug: API dist directory in symlink:"
          ls -la "$CURRENT_DIR/api/dist/" || echo "API dist directory not found in symlink"
          echo "🔍 Debug: Testing direct access to server.js:"
          ls -la "$CURRENT_DIR/api/dist/server.js" || echo "server.js not found in symlink"
          
          # Restart PM2 processes
          echo "🔄 Restarting PM2 processes..."
          cd "$CURRENT_DIR"
          echo "🔍 Debug: Current directory contents:"
          ls -la
          echo "🔍 Debug: Ops directory contents:"
          ls -la ops/
          echo "🔍 Debug: Ops config directory contents:"
          ls -la ops/config/
          # Debug: Check what files exist in the API directory
          echo "🔍 Debug: Current symlink points to:"
          ls -la /var/www/whitepine/current
          echo "🔍 Debug: API directory contents:"
          ls -la /var/www/whitepine/current/api/ || echo "API directory not found in current"
          echo "🔍 Debug: API dist directory contents:"
          ls -la /var/www/whitepine/current/api/dist/ || echo "API dist directory not found in current"
          echo "🔍 Debug: Latest release API directory contents:"
          LATEST_RELEASE=$(ls -t /var/www/whitepine/releases/ | head -1)
          echo "Latest release: $LATEST_RELEASE"
          ls -la /var/www/whitepine/releases/$LATEST_RELEASE/api/ || echo "API directory not found in latest release"
          echo "🔍 Debug: Latest release API dist directory contents:"
          ls -la /var/www/whitepine/releases/$LATEST_RELEASE/api/dist/ || echo "API dist directory not found in latest release"
          
          # Stop all PM2 processes first
          echo "🛑 Stopping all PM2 processes..."
          pm2 stop all || echo "No processes to stop"
          pm2 delete all || echo "No processes to delete"
          
          # Aggressive port cleanup
          echo "🔧 Cleaning up ports..."
          lsof -ti:3000 | xargs -r kill -9 || echo "No processes on port 3000"
          lsof -ti:3001 | xargs -r kill -9 || echo "No processes on port 3001"
          lsof -ti:4000 | xargs -r kill -9 || echo "No processes on port 4000"
          lsof -ti:4001 | xargs -r kill -9 || echo "No processes on port 4001"
          sleep 2
          
          # Use the ecosystem.config.cjs file directly
          if [ -f "ops/config/ecosystem.config.cjs" ]; then
            echo "🔧 Using ecosystem.config.cjs file..."
            pm2 start ops/config/ecosystem.config.cjs
          else
            echo "⚠️ ecosystem.config.cjs not found, trying .js file..."
            if [ -f "ops/config/ecosystem.config.js" ]; then
              echo "🔧 Copying ecosystem.config.js to .cjs to fix ES module error..."
              cp ops/config/ecosystem.config.js ecosystem.config.cjs
              pm2 reload ecosystem.config.cjs --env $ENVIRONMENT
            else
              echo "❌ No ecosystem config file found!"
              exit 1
            fi
          fi
          
          # Wait for services to start
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          # Health check
          echo "🏥 Performing health check..."
          echo "🔍 Debug: Checking PM2 status..."
          pm2 status
          echo "🔍 Debug: Checking PM2 logs..."
          pm2 logs --lines 5
          
          echo "🔍 Debug: Testing web app health check..."
          timeout 10 curl -f -s "https://whitepine.jpkramer.com/" > /dev/null && echo "✅ Web app health check passed" || echo "❌ Web app health check failed"
          
          echo "🔍 Debug: Testing API health check..."
          timeout 10 curl -f -s "https://whitepine.jpkramer.com/api/healthz" > /dev/null && echo "✅ API health check passed" || echo "❌ API health check failed"
          
          echo "🔍 Debug: Testing local API health check..."
          timeout 5 curl -f -s "http://localhost:4000/api/healthz" > /dev/null && echo "✅ Local API health check passed" || echo "❌ Local API health check failed"
          
          echo "🔍 Debug: Checking API process logs for errors..."
          pm2 logs api-prod --lines 10
          echo "🔍 Debug: Checking if API processes are actually running..."
          pm2 show api-prod
          
          # Don't exit on health check failure, just warn
          echo "⚠️ Health check failed, but deployment may still be partially successful"
          echo "🔍 Debug: Final PM2 status:"
          pm2 status
          
          echo "✅ Deployment completed successfully!"
          
          # Clean up old releases (keep last 5)
          echo "🧹 Cleaning up old releases..."
          cd /var/www/whitepine/releases
          ls -t | tail -n +6 | xargs -r rm -rf
          
          echo "🎉 Production deployment finished!"
          EOF
          
          chmod +x deployment-package/deploy.sh

      - name: Upload deployment package
        run: |
          echo "🔧 Creating SSH key file..."
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          
          echo "🔧 Checking server disk space and cleaning up..."
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }} "
            echo '🔍 Checking disk space:'
            df -h
            echo '🧹 Cleaning up old deployments and temporary files...'
            rm -rf /tmp/deployment
            rm -rf /var/www/whitepine/releases/*
            rm -rf /tmp/*
            echo '🔍 Checking disk space after cleanup:'
            df -h
            echo '🔧 Creating target directory structure...'
            mkdir -p /tmp/deployment
            mkdir -p /tmp/deployment/web-next
            mkdir -p /tmp/deployment/web-next/static
            mkdir -p /tmp/deployment/web-next/server
            mkdir -p /tmp/deployment/web-next/cache
            mkdir -p /tmp/deployment/web-next/diagnostics
            mkdir -p /tmp/deployment/web-next/types
            mkdir -p /tmp/deployment/web-public
            mkdir -p /tmp/deployment/api-dist
            mkdir -p /tmp/deployment/api-migrations
            mkdir -p /tmp/deployment/ops
            echo '✅ Target directory structure created'
            echo '🔍 Final disk space check:'
            df -h
          "
          
          echo "📦 Uploading deployment package files..."
          # Check what directories exist and upload them
          echo "🔍 Checking web-next directory contents:"
          ls -la deployment-package/web-next/
          
          # Upload web app files using rsync (more reliable than scp)
          if [ -d "deployment-package/web-next/static" ]; then
            echo "📁 Uploading static directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/static/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/static/
          fi
          
          if [ -d "deployment-package/web-next/standalone" ]; then
            echo "📁 Uploading standalone directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/standalone/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/standalone/
          fi
          
          if [ -d "deployment-package/web-next/server" ]; then
            echo "📁 Uploading server directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/server/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/server/
          fi
          
          if [ -d "deployment-package/web-next/cache" ]; then
            echo "📁 Uploading cache directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/cache/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/cache/
          fi
          
          if [ -d "deployment-package/web-next/diagnostics" ]; then
            echo "📁 Uploading diagnostics directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/diagnostics/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/diagnostics/
          fi
          
          if [ -d "deployment-package/web-next/types" ]; then
            echo "📁 Uploading types directory..."
            rsync -avz -e "ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key" deployment-package/web-next/types/ ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/types/
          fi
          
          # Upload any other files in web-next (excluding cache)
          echo "📁 Uploading other web-next files..."
          find deployment-package/web-next -maxdepth 1 -type f -exec scp -o StrictHostKeyChecking=no -i /tmp/ssh_key {} ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-next/ \;
          
          # Upload web-public files
          echo "📁 Uploading web-public files..."
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/web-public/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/web-public/
          
          # Upload API files
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/api-dist/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/api-dist/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/api-migrations/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/api-migrations/
          
          # Upload ops files
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key -r deployment-package/ops/* ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/ops/
          
          # Upload individual files
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/web-package.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/web-package-lock.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/api-package.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/api-package-lock.json ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/migrate-mongo-config.cjs ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key deployment-package/deploy.sh ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:/tmp/deployment/
          
          echo "✅ Deployment package uploaded successfully!"
          
          # Clean up SSH key
          rm -f /tmp/ssh_key

      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Set environment variables from GitHub secrets
            export MONGODB_URI_PROD="${{ secrets.MONGODB_URI_PROD }}"
            export MONGODB_URI_DEV="${{ secrets.MONGODB_URI_DEV }}"
            export SESSION_SECRET="${{ secrets.SESSION_SECRET }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            export S3_BUCKET="${{ secrets.S3_BUCKET }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            echo "🔍 Checking deployment directory contents:"
            ls -la /tmp/deployment/
            echo "📁 Current directory: $(pwd)"
            echo "📋 Available files:"
            find /tmp/deployment -type f -name "*.sh" 2>/dev/null || echo "No .sh files found"
            echo "🔍 Checking API files in deployment:"
            ls -la /tmp/deployment/api-dist/ || echo "API dist directory not found"
            ls -la /tmp/deployment/api-migrations/ || echo "API migrations directory not found"
            echo "🔍 Checking what's in the current release directory:"
            ls -la /var/www/whitepine/current/ || echo "Current directory not found"
            echo "🔍 Checking what's in the latest release directory:"
            LATEST_RELEASE=$(ls -t /var/www/whitepine/releases/ | head -1)
            echo "Latest release: $LATEST_RELEASE"
            ls -la /var/www/whitepine/releases/$LATEST_RELEASE/ || echo "Latest release directory not found"
            
            cd /tmp/deployment
            echo "📂 Changed to deployment directory: $(pwd)"
            ls -la
            
            if [ -f "deployment-package/deploy.sh" ]; then
              echo "✅ Found deploy.sh, making it executable and running..."
              cd deployment-package
              chmod +x deploy.sh
              ./deploy.sh
            elif [ -f "deploy.sh" ]; then
              echo "✅ Found deploy.sh, making it executable and running..."
              chmod +x deploy.sh
              ./deploy.sh
            else
              echo "❌ deploy.sh not found in /tmp/deployment"
              echo "Available files:"
              ls -la
              exit 1
            fi

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "📊 PM2 Status:"
            pm2 status
            
            echo "🌐 Testing endpoints:"
            curl -f -s "https://whitepine.jpkramer.com/" > /dev/null && echo "✅ Web app is responding"
            curl -f -s "https://whitepine.jpkramer.com/api/healthz" > /dev/null && echo "✅ API is responding"
            
            echo "🔍 Recent logs:"
            pm2 logs --lines 10
