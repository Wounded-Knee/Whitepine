name: Deploy to AWS Lightsail

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  LIGHTSAIL_INSTANCE: whitepine-dev
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Run tests (if available)
        run: npm test --if-present
      
      - name: Build application
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.whitepine.com' || 'https://dev-api.whitepine.com' }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ""
      
      - name: Get instance IP
        id: get-ip
        run: |
          INSTANCE_IP=$(aws lightsail get-instance --instance-name ${{ env.LIGHTSAIL_INSTANCE }} --query 'instance.publicIpAddress' --output text)
          echo "instance_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT
          echo "Instance IP: $INSTANCE_IP"
      
      - name: Create deployment package
        run: |
          tar -czf whitepine-deployment.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.next \
            --exclude=out \
            --exclude=infrastructure \
            --exclude=scripts \
            --exclude=*.log \
            --exclude=.github \
            .
      
      - name: Upload deployment package
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            whitepine-deployment.tar.gz ubuntu@${{ steps.get-ip.outputs.instance_ip }}:/tmp/
      
      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${{ steps.get-ip.outputs.instance_ip }} << 'EOF'
            set -e
            
            echo "📁 Extracting deployment package..."
            cd /opt/whitepine
            tar -xzf /tmp/whitepine-deployment.tar.gz
            
            echo "🔧 Setting up environment..."
            if [ ! -f .env ]; then
              cp .env.template .env
              echo "⚠️  Please configure your .env file with your MongoDB connection string and JWT secret"
            fi
            
            echo "📦 Installing dependencies..."
            npm ci --production
            
            echo "🏗️ Building application..."
            npm run build
            
            echo "🔄 Restarting application..."
            pm2 restart all
            
            echo "✅ Application deployed successfully!"
          EOF
      
      - name: Wait for deployment
        run: |
          sleep 30
      
      - name: Health check
        run: |
          INSTANCE_IP="${{ steps.get-ip.outputs.instance_ip }}"
          
          # Test backend health endpoint
          if curl -f http://$INSTANCE_IP/health > /dev/null 2>&1; then
            echo "✅ Backend health check passed"
          else
            echo "⚠️  Backend health check failed. Application may still be starting up."
          fi
          
          # Test frontend
          if curl -f http://$INSTANCE_IP/ > /dev/null 2>&1; then
            echo "✅ Frontend is accessible"
          else
            echo "⚠️  Frontend check failed. Application may still be starting up."
          fi
      
      - name: Notify deployment status
        run: |
          INSTANCE_IP="${{ steps.get-ip.outputs.instance_ip }}"
          BRANCH="${{ github.ref_name }}"
          
          echo "✅ Deployment successful!"
          echo "🌐 Environment: $BRANCH"
          echo "🔗 Frontend: http://$INSTANCE_IP"
          echo "🔗 Backend API: http://$INSTANCE_IP/api"
          echo "🔗 Health Check: http://$INSTANCE_IP/health"
          
          # Add Slack/email notifications here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"✅ Whitepine deployed to $BRANCH environment"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
