name: Simple Deploy

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'dev' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: whitepine-${{ github.ref == 'refs/heads/main' && 'production' || 'dev' }}-app
  S3_BUCKET: whitepine-${{ github.ref == 'refs/heads/main' && 'production' || 'dev' }}-frontend
  CF_DIST_ID: ${{ github.ref == 'refs/heads/main' && secrets.CF_DIST_ID_PRODUCTION || secrets.CF_DIST_ID_DEV }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.whitepine.com' || 'https://dev-api.whitepine.com' }}
      
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy-${{ env.ENVIRONMENT }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Deploy to ECS
        env:
          ECS_SERVICE: whitepine-${{ env.ENVIRONMENT }}-service
          ECS_CLUSTER: whitepine-${{ env.ENVIRONMENT }}-cluster
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment
      
      - name: Sync static assets to S3
        run: |
          aws s3 sync out s3://$S3_BUCKET/ \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"
      
      - name: Upload HTML files to S3
        run: |
          find out -name "*.html" -exec sh -c '
            key="${1#out/}"
            aws s3 cp "$1" "s3://$S3_BUCKET/$key" \
              --cache-control "no-cache" \
              --content-type "text/html; charset=utf-8"
          ' _ {} \;
      
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"
      
      - name: Notify deployment status
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Environment: ${{ env.ENVIRONMENT }}"
          echo "🔗 API: ${{ github.ref == 'refs/heads/main' && 'https://api.whitepine.com' || 'https://dev-api.whitepine.com' }}"
